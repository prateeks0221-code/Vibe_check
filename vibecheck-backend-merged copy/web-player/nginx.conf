server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Pass the original host (with port) to proxy_redirect
    set $original_host $http_host;

    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy HLS requests to MediaMTX
    location /hls/ {
        proxy_pass http://vc_mediamtx:8888/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect ~^/(.*)$ http://$original_host/hls/$1;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control no-cache;
    }

    # Proxy API requests
    location /api/ {
        proxy_pass http://vc_api_server:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }

    # Proxy WebSocket
    location /ws/ {
        proxy_pass http://vc_api_server:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}
