###############################################
# Global settings
###############################################

logLevel: info
logDestinations: [stdout]

readTimeout: 10s
writeTimeout: 10s

###############################################
# RTSP server
###############################################
rtsp: true
rtspAddress: :8554
rtpAddress: :8000
rtcpAddress: :8001

###############################################
# RTMP server
###############################################
rtmp: true
rtmpAddress: :1935

###############################################
# HLS server (native — we may use this directly)
###############################################
hls: true
hlsAddress: :8888
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 500ms
hlsAllowOrigins: ['*']
hlsAlwaysRemux: true

###############################################
# WebRTC server
###############################################
webrtc: true
webrtcAddress: :8889
webrtcAllowOrigins: ['*']

###############################################
# SRT server
###############################################
srt: true
srtAddress: :8890

###############################################
# Default path settings
###############################################
pathDefaults:
  source: publisher
  overridePublisher: true

###############################################
# Path settings
###############################################
paths:
  all_others:

  # ── venue-001: REAL CCTV CAMERA ───────────────────────────────
  # MediaMTX pulls from the camera.  No runOnInit.
  # If you want to switch back to dummy, comment out "source"
  # and uncomment "runOnInit".
  venue-001:
    source: rtsp://192.168.0.108:8080/h264_pcm.sdp
    # runOnInit: /opt/homebrew/bin/ffmpeg -re -f lavfi -i testsrc=size=1280x720:rate=15 -pix_fmt yuv420p -c:v libx264 -preset ultrafast -tune zerolatency -f rtsp rtsp://localhost:8554/venue-001
    # runOnInitRestart: yes

  # ── venue-002: DUMMY TEST PATTERN ─────────────────────────────
  venue-002:
    source: publisher
    runOnInit: /opt/homebrew/bin/ffmpeg -re -f lavfi -i testsrc=size=1280x720:rate=15 -pix_fmt yuv420p -c:v libx264 -preset ultrafast -tune zerolatency -f rtsp rtsp://localhost:8554/venue-002
    runOnInitRestart: yes

  # ── venue-003: DUMMY TEST PATTERN ─────────────────────────────
  venue-003:
    source: publisher
    runOnInit: /opt/homebrew/bin/ffmpeg -re -f lavfi -i testsrc=size=1280x720:rate=15 -pix_fmt yuv420p -c:v libx264 -preset ultrafast -tune zerolatency -f rtsp rtsp://localhost:8554/venue-003
    runOnInitRestart: yes
